approval_mode = "approve"

[mcp_servers.desktop-commander.tools.move_file]
approval_mode = "approve"

[mcp_servers.desktop-commander.tools.kill_process]
approval_mode = "approve"

[mcp_servers.desktop-commander.tools.create_directory]
approval_mode = "approve"



