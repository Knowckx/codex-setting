model = "gpt-5.4-mini"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-failure"

[features]
shell_tool = false

[windows]
sandbox = "elevated"

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.context7]
command = "pnpm"
args = ["dlx", "@upstash/context7-mcp@latest"]
startup_timeout_ms = 20_000


[mcp_servers.desktop-commander]
enabled = true
command = "pnpm"
args = ["dlx", "@wonderwhy-er/desktop-commander@latest"]
env = { PYTHONUTF8 = "1" }

[mcp_servers.desktop-commander.tools.start_process]
approval_mode = "approve"

[mcp_servers.desktop-commander.tools.edit_block]
approval_mode = "approve"

[mcp_servers.desktop-commander.tools.set_config_value]
approval_mode = "approve"



[projects.'C:\Users\AA\.codex']
trust_level = "trusted"


[projects.'E:\dev\py\alchemy-dev']
trust_level = "trusted"
