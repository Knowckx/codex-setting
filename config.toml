[features]
shell_tool = false

[windows]
sandbox = "elevated"

[plugins."github@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[mcp_servers.context7]
command = "pnpm"
args = ["dlx", "@upstash/context7-mcp@latest"]
startup_timeout_ms = 20_000


[mcp_servers.desktop-commander]
enabled = true
